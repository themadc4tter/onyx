<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onyx</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body { background: #000; }
      #game-root {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      canvas { display: block; image-rendering: pixelated; }
      #world-label-layer {
        position: absolute;
        inset: 0;
        z-index: 5;
        overflow: hidden;
        pointer-events: none;
      }
      .world-label {
        position: absolute;
        left: 0;
        top: 0;
        max-width: 160px;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0;
        white-space: nowrap;
        text-align: center;
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
        text-shadow:
          0 1px 0 #000,
          1px 0 0 #000,
          0 -1px 0 #000,
          -1px 0 0 #000,
          1px 1px 0 #000;
        will-change: transform;
        transition: opacity 80ms linear;
      }
      .world-label-title {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
