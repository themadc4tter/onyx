services:
  - type: web
    name: onyx-server
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: starter        # paid tier — no cold starts (required for persistent WebSockets)
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false      # fill in manually: the onyx-client Render URL
      - key: SUPABASE_URL
        value: https://xmerawtriortqtziwjbm.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false      # fill in manually: your Supabase service_role secret key

  - type: web
    name: onyx-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SERVER_URL
        sync: false      # fill in manually: the onyx-server Render URL
      - key: VITE_SUPABASE_URL
        value: https://xmerawtriortqtziwjbm.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false      # fill in manually: your Supabase anon public key
