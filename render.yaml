services:
  - type: web
    name: onyx-server
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: starter        # paid tier — no cold starts (required for persistent WebSockets)
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false      # fill in manually: the onyx-client Render URL (e.g. https://onyx-client.onrender.com)

  - type: web
    name: onyx-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SERVER_URL
        sync: false      # fill in manually: the onyx-server Render URL (e.g. https://onyx-server.onrender.com)
